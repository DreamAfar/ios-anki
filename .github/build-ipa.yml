name: Build Unsigned IPA

on:
  # 手动触发
  workflow_dispatch:
  # 或者每次推送 main 分支时自动触发（可选）
  # push:
  #   branches: [main]

jobs:
  build:
    runs-on: macos-15  # 包含 Xcode 16，满足项目要求

    steps:
      # ── 1. 检出代码（含子模块）──────────────────────────────────
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 安装 Rust 工具链 ────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"   # 项目要求 1.92+
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      # ── 3. 缓存 Rust 编译产物（加速后续构建）──────────────────
      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            anki-bridge-rs/target
            anki-upstream/out
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      # ── 4. 安装 Homebrew 依赖 ──────────────────────────────────
      - name: Install Homebrew dependencies
        run: |
          brew install protobuf swift-protobuf xcodegen

      # ── 5. 构建 Rust XCFramework ───────────────────────────────
      - name: Build Rust XCFramework
        run: |
          chmod +x ./scripts/build-xcframework.sh
          ./scripts/build-xcframework.sh

      # ── 6. 生成 Swift Protobuf 类型 ────────────────────────────
      - name: Generate Swift protobuf types
        run: |
          chmod +x ./scripts/generate-protos.sh
          ./scripts/generate-protos.sh

      # ── 7. 生成 Xcode 项目 ─────────────────────────────────────
      - name: Generate Xcode project
        run: |
          cd AnkiApp && xcodegen generate

      # ── 8. 确认 Xcode 版本 ─────────────────────────────────────
      - name: Show Xcode version
        run: xcodebuild -version

      # ── 9. 构建（无签名 archive）──────────────────────────────
      # 关键参数：
      #   CODE_SIGN_IDENTITY=""          → 不使用任何证书
      #   CODE_SIGNING_REQUIRED=NO       → 不强制签名
      #   CODE_SIGNING_ALLOWED=NO        → 完全跳过签名
      - name: Build unsigned xcarchive
        run: |
          xcodebuild archive \
            -workspace AnkiApp/AnkiApp.xcworkspace \
            -scheme AnkiApp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/AnkiApp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

          # 如果没有 xcworkspace，尝试 xcodeproj
          # -project AnkiApp/AnkiApp.xcodeproj \

      # ── 10. 打包成 IPA ─────────────────────────────────────────
      # 原理：IPA 就是一个 zip 文件
      #   xcarchive/Products/Applications/*.app → Payload/*.app → 压缩 → .ipa
      - name: Package .app into unsigned .ipa
        run: |
          ARCHIVE_PATH="$RUNNER_TEMP/AnkiApp.xcarchive"
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)

          echo "Found app: $APP_PATH"

          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/

          cd /tmp
          zip -r AnkiApp-unsigned.ipa Payload

          echo "IPA created: /tmp/AnkiApp-unsigned.ipa"
          ls -lh /tmp/AnkiApp-unsigned.ipa

      # ── 11. 上传为 Artifact ────────────────────────────────────
      - name: Upload unsigned IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnkiApp-unsigned-ipa
          path: /tmp/AnkiApp-unsigned.ipa
          retention-days: 7   # 保留 7 天，免费账号限制
